name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

jobs:
  validate-release:
    name: Validate release tag and workspace
    if: github.repository == 'kdcokenny/kagi-rs'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure tag commit is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} must point to a commit already reachable from origin/main."
            exit 1
          fi

      - name: Ensure tag version matches workspace source-of-truth version
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          cargo_toml = pathlib.Path("Cargo.toml")
          workspace_data = tomllib.loads(cargo_toml.read_text(encoding="utf-8"))
          workspace_version = workspace_data.get("workspace", {}).get("package", {}).get("version")

          if not workspace_version:
              raise SystemExit("::error::workspace.package.version is missing from Cargo.toml.")

          tag_name = os.environ["GITHUB_REF_NAME"]
          if not tag_name.startswith("v"):
              raise SystemExit(f"::error::Release tag '{tag_name}' must start with 'v'.")

          tag_version = tag_name[1:]
          if tag_version != workspace_version:
              raise SystemExit(
                  "::error::Release tag version does not match workspace.package.version "
                  f"({tag_version} != {workspace_version})."
              )

          print(
              f"Release tag version {tag_version} matches workspace source-of-truth version {workspace_version}."
          )
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run doc tests
        run: cargo test --doc --workspace --locked

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

  build-binaries:
    name: Build kagi-mcp (${{ matrix.target }})
    if: github.repository == 'kdcokenny/kagi-rs'
    needs:
      - validate-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: kagi-mcp
          - target: x86_64-apple-darwin
            os: macos-13
            binary_name: kagi-mcp
          - target: aarch64-apple-darwin
            os: macos-14
            binary_name: kagi-mcp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: kagi-mcp.exe
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Build release binary
        run: cargo build -p kagi-mcp --release --locked --target ${{ matrix.target }}

      - name: Collect release artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/kagi-mcp-${GITHUB_REF_NAME}-${{ matrix.target }}"

      - name: Collect release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/kagi-mcp-$env:GITHUB_REF_NAME-${{ matrix.target }}.exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: kagi-mcp-${{ matrix.target }}
          path: dist/*

  publish-release:
    name: Publish GitHub release
    if: github.repository == 'kdcokenny/kagi-rs'
    needs:
      - build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: kagi-mcp-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish release assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
