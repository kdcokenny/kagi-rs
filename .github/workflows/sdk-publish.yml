name: SDK Publish

on:
  push:
    tags:
      - "sdk-v*.*.*"

permissions:
  contents: read

jobs:
  publish-sdk:
    name: Validate and publish kagi-sdk
    if: github.repository == 'kdcokenny/kagi-rs'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Ensure tag commit is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} must point to a commit already reachable from origin/main."
            exit 1
          fi

      - name: Ensure SDK tag version matches sdk/Cargo.toml
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          tag_name = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(r"sdk-v(\d+\.\d+\.\d+)", tag_name)
          if match is None:
              raise SystemExit(f"::error::Release tag '{tag_name}' must match sdk-vX.Y.Z.")

          tag_version = match.group(1)
          cargo_toml = pathlib.Path("sdk/Cargo.toml")
          package = tomllib.loads(cargo_toml.read_text(encoding="utf-8")).get("package", {})
          crate_name = package.get("name")
          manifest_version = package.get("version")

          if crate_name != "kagi-sdk":
              raise SystemExit(
                  f"::error::sdk/Cargo.toml package.name must be 'kagi-sdk' (found {crate_name!r})."
              )

          if not isinstance(manifest_version, str):
              raise SystemExit("::error::sdk/Cargo.toml package.version must be an explicit string.")

          if tag_version != manifest_version:
              raise SystemExit(
                  "::error::Release tag version does not match sdk/Cargo.toml package.version "
                  f"({tag_version} != {manifest_version})."
              )

          print(f"SDK tag version {tag_version} matches sdk/Cargo.toml package.version.")
          PY

      - name: Fail fast if kagi-sdk version already exists on crates.io
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import urllib.error
          import urllib.request

          tag_name = os.environ["GITHUB_REF_NAME"]
          match = re.fullmatch(r"sdk-v(\d+\.\d+\.\d+)", tag_name)
          if match is None:
              raise SystemExit(f"::error::Release tag '{tag_name}' must match sdk-vX.Y.Z.")

          version = match.group(1)
          url = f"https://crates.io/api/v1/crates/kagi-sdk/{version}"

          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"kagi-sdk@{version} does not exist on crates.io; publish may proceed.")
                  raise SystemExit(0)
              raise SystemExit(f"::error::crates.io request failed with HTTP {exc.code} for {url}")
          except urllib.error.URLError as exc:
              raise SystemExit(f"::error::Unable to reach crates.io ({exc}).")

          reported_version = payload.get("version", {}).get("num")
          if reported_version == version:
              raise SystemExit(
                  f"::error::kagi-sdk@{version} already exists on crates.io. Refusing duplicate publish."
              )

          raise SystemExit(
              "::error::crates.io returned an unexpected payload while checking existing version "
              f"({reported_version!r} for expected {version!r})."
          )
          PY

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Run doc tests
        run: cargo test --doc --workspace --locked

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked

      - name: List package contents
        run: cargo package --locked -p kagi-sdk --list

      - name: Dry-run publish
        run: cargo publish --locked -p kagi-sdk --dry-run

      - name: Publish kagi-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked -p kagi-sdk
