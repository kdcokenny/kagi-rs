name: SDK Publish

on:
  push:
    tags:
      - "sdk-v*.*.*"

permissions:
  contents: read

jobs:
  publish-sdk:
    name: Validate and publish kagi-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      publish_state: ${{ steps.publish-decision.outputs.publish_state }}
      version: ${{ steps.publish-decision.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Ensure tag commit is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} must point to a commit already reachable from origin/main."
            exit 1
          fi

      - name: Decide SDK publish state
        id: publish-decision
        run: |
          set -euo pipefail
          python scripts/release-publish-decision.py \
            --crate-name kagi-sdk \
            --manifest-path sdk/Cargo.toml \
            --tag-prefix sdk-v \
            --tag-name "${GITHUB_REF_NAME}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --repository "${GITHUB_REPOSITORY}" \
            --expected-repository kdcokenny/kagi-rs \
            --github-output "${GITHUB_OUTPUT}"

      - name: Fail on SDK publish conflict
        if: steps.publish-decision.outputs.publish_state == 'conflict'
        run: |
          set -euo pipefail
          echo "${{ steps.publish-decision.outputs.decision_reason }}"
          exit 1

      - name: Log SDK publish_state
        run: |
          set -euo pipefail
          echo "publish_state=${{ steps.publish-decision.outputs.publish_state }}"
          echo "version=${{ steps.publish-decision.outputs.version }}"
          echo "version_exists_on_crates_io=${{ steps.publish-decision.outputs.version_exists_on_crates_io }}"

      - name: Install Rust toolchain
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Check formatting
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo fmt --all --check

      - name: Lint workspace
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo test --workspace --locked

      - name: Run doc tests
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo test --doc --workspace --locked

      - name: Build workspace
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo build --workspace --all-targets --locked

      - name: List package contents
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo package --locked -p kagi-sdk --list

      - name: Dry-run publish
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        run: cargo publish --locked -p kagi-sdk --dry-run

      - name: Publish kagi-sdk
        if: steps.publish-decision.outputs.should_run_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked -p kagi-sdk

  release:
    name: Upsert SDK GitHub Release
    needs: publish-sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Create or edit SDK release object
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.publish-sdk.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          trap 'rm -f "$notes_file"' EXIT

          cat > "$notes_file" <<EOF
          Published \`kagi-sdk\` \`${VERSION}\` to crates.io.

          - Crate: https://crates.io/crates/kagi-sdk/${VERSION}
          - Docs: https://docs.rs/kagi-sdk/${VERSION}
          EOF

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file "$notes_file"
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" --verify-tag --title "${GITHUB_REF_NAME}" --notes-file "$notes_file"
